# Template configuration for a single client.
# Copy this folder for each new client and fill in the values.

client:
  id: client-slug
  name: Client Display Name
  industry: handyman
  status: active
  owner: Your Name
  timezone: Asia/Jerusalem
  locale: en-IL
  language: en

contact:
  primary_contact_name: Client Contact
  primary_contact_email: client@example.com
  primary_contact_phone: "+0000000000"
  website: https://example.com

business:
  service_area:
    - Tel Aviv
    - Ramat Gan
  business_hours:
    monday: "08:00-18:00"
    tuesday: "08:00-18:00"
    wednesday: "08:00-18:00"
    thursday: "08:00-18:00"
    friday: "08:00-14:00"
    saturday: closed
    sunday: closed
  core_services:
    - repairs
    - installation
    - emergency calls
  pricing_notes: ""
  service_rules:
    - "Do not promise a price without checking the pricing policy."
    - "Escalate urgent jobs to a human."

channels:
  primary: whatsapp
  whatsapp:
    enabled: true
    business_account_id: ""
    phone_number_id: ""
    display_name: ""
    webhook_path: /webhooks/whatsapp
    mode: suggestion_only

features:
  - id: whatsapp-business-reply-suggestion-assistant
    name: WhatsApp Reply Approval Bot
    status: active
    channel: whatsapp
    mode: approval_bot
    description: Drafts suggested replies for active WhatsApp conversations and keeps the final send manual.

agent:
  name: "Assistant"
  purpose: "Suggest helpful replies for customer messages."
  tone:
    style: friendly
    formality: medium
    brevity: concise
  capabilities:
    - intake
    - reply_suggestions
    - summarize_thread
    - extract_job_details
  response_policy:
    require_human_review: true
    can_send_messages: false
    can_edit_knowledge: false

knowledge:
  sources:
    - knowledge/faq.md
    - knowledge/services.md
    - knowledge/pricing.md
    - knowledge/policies.md
  notes: ""

integrations:
  calendar: none
  crm: none
  payments: none
  storage: local

guardrails:
  never_guess_prices: true
  never_share_secrets: true
  never_make_legal_or_medical_claims: true
  escalate_when:
    - unclear_scope
    - emergency
    - payment_dispute
    - out_of_hours_exception

ops:
  created_at: ""
  updated_at: ""
  tags: []
  notes: ""

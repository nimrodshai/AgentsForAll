<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./portal/" />
    <title>Workspace Portal</title>
    <meta
      name="description"
      content="Open the portal workspace."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f0e8;
        --bg2: #edf6f5;
        --ink: #1f2937;
        --muted: #5b6472;
        --card: rgba(255, 255, 255, 0.86);
        --line: rgba(30, 41, 59, 0.12);
        --accent: #0f766e;
        --accent-ink: #ffffff;
        --shadow: 0 28px 60px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 34%),
          radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.14), transparent 28%),
          linear-gradient(145deg, var(--bg), var(--bg2));
      }

      .card {
        width: min(100%, 42rem);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        padding: clamp(1.5rem, 4vw, 2.5rem);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.75rem;
        color: var(--accent);
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }

      p {
        margin: 1rem 0 0;
        font-size: 1rem;
        line-height: 1.65;
        color: var(--muted);
        max-width: 34rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.6rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0.85rem 1.15rem;
        border-radius: 999px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.96rem;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease,
          border-color 160ms ease;
      }

      .button.primary {
        color: var(--accent-ink);
        background: var(--accent);
        box-shadow: 0 18px 34px rgba(15, 118, 110, 0.22);
      }

      .button.secondary {
        color: var(--ink);
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.75);
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
      }

      .meta {
        margin-top: 1.2rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
    <script>
      window.location.replace("./portal/");
    </script>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Workspace</p>
      <h1>Opening the portal.</h1>
      <p>
        This GitHub Pages entry point sends you to the portal workspace where the client
        guidance editor and preview tools live.
      </p>
      <div class="actions">
        <a class="button primary" href="./portal/">Open Portal</a>
        <a class="button secondary" href="./portal/" rel="noopener">Go directly</a>
      </div>
      <p class="meta">
        If the redirect does not happen automatically, use the button above.
      </p>
    </main>
  </body>
</html>

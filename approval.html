<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Approval chat · Lalo</title>
    <meta
      name="description"
      content="A compact WhatsApp-style approval screen with conversation history, one incoming message, and a reply draft in the input field."
    />
    <link rel="stylesheet" href="./approval.css" />
    <script src="./approval.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="chat card" aria-label="WhatsApp approval chat">
        <header class="chat-head">
          <div class="contact">
            <div id="senderAvatar" class="avatar" aria-hidden="true">JH</div>
            <div>
              <p id="senderName" class="contact-name">Jim Hopper</p>
              <p id="contactMeta" class="contact-meta">WhatsApp approval draft</p>
            </div>
          </div>

          <span id="statusPill" class="pill pending">Pending</span>
        </header>

        <div id="messageThread" class="thread" aria-live="polite" aria-relevant="additions text" role="log"></div>

        <div class="composer">
          <label class="field" for="replyInput">
            <span class="field-label">Your reply</span>
            <textarea id="replyInput" rows="4"></textarea>
          </label>

          <div class="button-row">
            <button id="sendButton" class="button primary" type="button">Send</button>
            <button id="editButton" class="button ghost is-hidden" type="button">Edit</button>
          </div>

          <p id="notice" class="notice">Edit the message and send it manually.</p>
        </div>
      </section>
    </main>
  </body>
</html>

services:
  - type: web
    name: assistyca-portal
    env: python
    plan: free
    autoDeploy: true
    branch: main
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: python3 -u scripts/run_portal_server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /portal/
    envVars:
      - key: PORTAL_MAIL_PROVIDER
        value: resend
      - key: PORTAL_PRODUCT_NAME
        value: Assistyca
      - key: PORTAL_RESEND_FROM_NAME
        value: Assistyca
      - key: PORTAL_RESEND_API_KEY
        sync: false
      - key: PORTAL_RESEND_FROM_EMAIL
        sync: false
